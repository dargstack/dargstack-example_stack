name: 'Release: Scheduled'

on:
  schedule:
    - cron: '0 0 15 * *' # Every 15th of the month at 00:00 AM UTC on the default branch
  workflow_dispatch:

jobs:
  release-schedule:
    name: 'Release: Scheduled'
    uses: dargmuesli/github-actions/.github/workflows/release-schedule.yml@2789c140ab6cc2f5a8d5c2d1f5cdc7a796056545 # 5.2.3
    permissions:
      contents: read
    secrets:
      PERSONAL_ACCESS_TOKEN: ${{ secrets.PERSONAL_ACCESS_TOKEN }}
    with:
      IS_DEBOUNCED: ${{ github.event_name != 'workflow_dispatch' }}
